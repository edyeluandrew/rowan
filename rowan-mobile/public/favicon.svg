<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#000000"/>
  
  <!-- Stylized R with Rowan yellow -->
  <defs>
    <linearGradient id="rowanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0B90B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main R shape -->
  <path d="M 70 50 L 70 150 M 70 50 L 130 50 Q 150 50 150 70 Q 150 85 130 90 L 70 90 M 130 90 L 150 150" 
    fill="none" 
    stroke="url(#rowanGradient)" 
    stroke-width="18" 
    stroke-linecap="round" 
    stroke-linejoin="round"/>
  
  <!-- Decorative accent circle -->
  <circle cx="155" cy="115" r="12" fill="#F0B90B" opacity="0.6"/>
</svg>