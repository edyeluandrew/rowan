services:
  - type: web
    name: rowan-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STELLAR_NETWORK
        sync: false
      - key: ESCROW_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: ENABLE_SMS_FALLBACK
        value: "false"
      - key: TEST_TRADER_EMAIL
        value: test.trader.flow@rowan.local
      - key: TEST_TRADER_PASSWORD
        value: TestFlow123!@#
      - key: TEST_TRADER_PHONE
        value: +256704888999
      - key: TEST_TRADER_NAME
        value: Test Trader Flow
